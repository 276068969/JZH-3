services:
  mysql:
    image: mysql:8.4
    container_name: emission-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: emission_platform
      MYSQL_USER: emission
      MYSQL_PASSWORD: emission123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uemission", "-pemission123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: emission-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  backend:
    build: ./backend
    container_name: emission-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: emission_platform
      MYSQL_USER: emission
      MYSQL_PASSWORD: emission123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: please-change-this-development-secret
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: emission-frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: emission-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
