server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: emission-regulatory-platform
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:emission_platform;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never

platform:
  jwt-secret: change-me-to-a-long-production-secret
  jwt-expire-hours: 12

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
